name: release-container

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  IMAGE: ghcr.io/dragoshont/k-core

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Prepare pinned PostgreSQL test image
        shell: bash
        run: |
          set -euo pipefail
          image="postgres:16.13-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50"
          docker pull "$image"
          docker tag "$image" postgres:16-alpine

      - name: Validate protected SemVer release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be vX.Y.Z" >&2
            exit 1
          fi
          package_version="$(node -p 'require("./package.json").version')"
          if [[ "$version" != "$package_version" ]]; then
            echo "Release tag must match package.json version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install exact dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify release source
        run: npm run test:oss-core

      - name: Run configured application gates
        run: ./gates/checks.sh

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish digest-addressed linux/amd64 image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            OCI_SOURCE=https://github.com/${{ github.repository }}
            OCI_REVISION=${{ github.sha }}
            OCI_VERSION=${{ steps.release.outputs.version }}
            OCI_LICENSES=Apache-2.0
          tags: |
            ${{ env.IMAGE }}:sha-${{ github.sha }}

      - name: Attest published image
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Publish digest-bound GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Published image digest is invalid" >&2
            exit 1
          fi
          notes="$(mktemp)"
          trap 'rm -f "$notes"' EXIT
          cat >"$notes" <<EOF
          Release image: \`${IMAGE}@${IMAGE_DIGEST}\`

          The OCI digest above is the immutable deployment identity. The
          \`sha-${GITHUB_SHA}\` tag is a commit locator; do not deploy by a mutable
          registry alias. The image includes an SPDX SBOM, SLSA v1 provenance, and a
          GitHub build-provenance attestation.
          EOF
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "k-core ${GITHUB_REF_NAME}" --notes-file "$notes"
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "k-core ${GITHUB_REF_NAME}" --notes-file "$notes"
          fi
