# Architrave — pre-installs the gate dependencies the Copilot cloud agent needs
# so it can run gates/checks.sh in its ephemeral environment.
# Docs: https://docs.github.com/copilot/how-tos/use-copilot-agents/cloud-agent/customize-the-agent-environment
#
# The job MUST be named `copilot-setup-steps`. Add your project's own build/test
# toolchain (node, dotnet, xcode, etc.) below so the agent can run the full gates.
name: "Copilot Setup Steps"

on: workflow_dispatch

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Architrave gate dependencies (jq)
        run: sudo apt-get update && sudo apt-get install -y jq
