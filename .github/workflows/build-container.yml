name: verify-container

on:
  pull_request:
    paths:
      - .env.example
      - .oss-snapshot.json
      - Dockerfile
      - .dockerignore
      - .gitignore
      - architrave.config.json
      - LICENSE
      - README.md
      - package.json
      - package-lock.json
      - contracts/**
      - docs/**
      - migrations/**
      - plugins/**
      - scripts/**
      - src/**
      - tests/**
      - tokens/**
      - tsconfig.json
      - .github/workflows/build-container.yml
      - .github/workflows/release-container.yml
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .env.example
      - .oss-snapshot.json
      - Dockerfile
      - .dockerignore
      - .gitignore
      - architrave.config.json
      - LICENSE
      - README.md
      - package.json
      - package-lock.json
      - contracts/**
      - docs/**
      - migrations/**
      - plugins/**
      - scripts/**
      - src/**
      - tests/**
      - tokens/**
      - tsconfig.json
      - .github/workflows/build-container.yml
      - .github/workflows/release-container.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install exact dependencies
        run: npm ci

      - name: Verify OSS candidate source
        run: npm run test:oss-core

      - name: Run configured application gates
        run: ./gates/checks.sh

      - name: Build and verify local linux/amd64 image
        env:
          OCI_REVISION: ${{ github.sha }}
        run: scripts/phase6-image-gate.sh k:ci-smoke
